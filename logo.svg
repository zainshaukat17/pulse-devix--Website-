<svg width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B6FF0"/>
      <stop offset="50%" style="stop-color:#C3A7FF"/>
      <stop offset="100%" style="stop-color:#E040FB"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B5CE5"/>
      <stop offset="100%" style="stop-color:#E040FB"/>
    </linearGradient>
  </defs>

  <!-- Icon mark - P shape made of pulse/signal bars -->
  <rect x="0" y="24" width="8" height="32" rx="4" fill="url(#iconGrad)" opacity="0.4"/>
  <rect x="12" y="14" width="8" height="52" rx="4" fill="url(#iconGrad)" opacity="0.6"/>
  <rect x="24" y="4" width="8" height="72" rx="4" fill="url(#iconGrad)"/>
  <rect x="36" y="18" width="8" height="44" rx="4" fill="url(#iconGrad)" opacity="0.7"/>
  <rect x="48" y="30" width="8" height="20" rx="4" fill="url(#iconGrad)" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="72" y="54" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="36" letter-spacing="-1" fill="#FFFFFF">Pulse</text>
  <text x="197" y="54" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="36" letter-spacing="-1" fill="url(#grad)">Devix</text>
</svg>
